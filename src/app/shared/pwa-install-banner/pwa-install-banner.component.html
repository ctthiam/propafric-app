<div class="install-banner" *ngIf="show()">
  <div class="banner-inner">
    <img src="icons/icon-72x72.png" alt="PropAfric" class="banner-logo">
    <div class="banner-text">
      <strong>PropAfric</strong>
      <span *ngIf="!isIos()">Installer l'application sur votre téléphone</span>
      <span *ngIf="isIos()">
        Appuyez sur
        <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        puis <em>Ajouter à l'écran d'accueil</em>
      </span>
    </div>
    <button *ngIf="!isIos()" class="btn-install" (click)="install()">Installer</button>
    <button class="btn-dismiss" (click)="dismiss()" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>
